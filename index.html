// ─── Helpers ─────────────────────────────────
function buildRanking(votes, isMale) {
  const voteKey = isMale ? "maleVote" : "femaleVote";
  const rel = votes.filter(v => v[voteKey]);
  if (!rel.length) return [1,2,3].map(r=>({rank:r,name:"--",score:0}));
  const cnt = rel.reduce((a,v)=>{ a[v[voteKey]]=(a[v[voteKey]]||0)+1; return a; },{});
  const sorted = Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const res=[]; let rank=0,last=-1;
  for(const [name,score] of sorted){
    if(score!==last){rank++;last=score;}
    if(rank>3)break;
    res.push({rank,name,score});
  }
  while(res.length<3) res.push({rank:res.length+1,name:"--",score:0});
  return res;
}

function weightedLottery(participants, penalized, count) {
  const pool=[];
  for(const name of participants){ const w=penalized.includes(name)?1:8; for(let i=0;i<w;i++)pool.push(name); }
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  const winners=[]; const seen=new Set();
  for(const name of shuffled){ if(!seen.has(name)){seen.add(name);winners.push(name);} if(winners.length>=count)break; }
  return winners;
}

// ─── Timer Display ───────────────────────────
function TimerDisplay({ remaining, timerEnabled, timerStartAt }) {
  if(!timerEnabled) return null;
  if(!timerStartAt) return (
    <div className="flex items-center justify-center gap-2 py-2 px-4 bg-slate-100 rounded-2xl text-slate-400 font-black text-sm">
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
      タイマーが設定されています
    </div>
  );
  if(remaining === null) return null;
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  const pct = remaining === 0 ? 0 : remaining;
  const isUrgent = remaining <= 30 && remaining > 0;
  const isExpired = remaining === 0;
  return (
    <div className={`rounded-2xl p-4 text-center space-y-2 ${isExpired?"bg-red-50 border-2 border-red-300":isUrgent?"bg-orange-50 border-2 border-orange-300":"bg-indigo-50 border-2 border-indigo-200"}`}>
      <p className={`text-[10px] font-black uppercase tracking-widest ${isExpired?"text-red-500":isUrgent?"text-orange-500":"text-indigo-500"}`}>
        {isExpired ? "⏰ 締め切り時間になりました" : "⏱ 残り時間"}
      </p>
      {!isExpired && (
        <div className={`text-5xl font-black tabular-nums ${isUrgent?"text-orange-600":"text-indigo-700"} ${isUrgent?"anim-pulse-scale":""}`}>
          {String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}
        </div>
      )}
    </div>
  );
}

  const submit = () => { const t=val.trim(); if(t){onAdd(t);setVal("");} };
  return (
    <div className="flex gap-2">
      <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}

      <button onClick={submit} className={`px-4 rounded-xl ${bgColor} text-white flex items-center justify-center`}><I.Plus/></button>
    </div>
  );
}

  },[lockedNickname]);

  // ── Firebase → State（読み取り専用、書き戻しなし）──
  useEffect(()=>{
    const refs = [];
    const sub = (key, fn) => {
      const r = db.ref(key);
      // nullも含めて受け取る（exists()チェックしない）→リセット時のnullも反映される
      r.on("value", s => fn(s.val()));
      refs.push(r);
    };

    sub(FK.THEME,     v => { if(v) { setThemeTitle(v); setTempTheme(v); } });
    sub(FK.VOTES,     v => setVotes(!v ? [] : Array.isArray(v) ? v : Object.values(v)));
    sub(FK.VOTED,     v => setVotedNicknames(v || {}));
    sub(FK.RESULTS,   v => setResultsOpen(!!v));
    sub(FK.COUNT,     v => { if(v !== null) setWinnerCount(v); });
    sub(FK.LOTTERY,   v => setLotteryWinners(!v ? [] : Array.isArray(v) ? v : Object.values(v)));
    sub(FK.GAME,      v => setGameOpen(!!v));
    sub(FK.PENALIZED, v => setPenalizedPlayers(!v ? [] : Array.isArray(v) ? v : Object.values(v)));
    sub(FK.ELECTION_LABEL, v => { if(v){ setElectionLabel(v); setTempElectionLabel(v); } });
    sub(FK.TIMER_ENABLED, v => setTimerEnabled(!!v));
    sub(FK.TIMER_MINS,    v => { if(v !== null) setTimerMins(v); });
    sub(FK.TIMER_SECS,    v => { if(v !== null) setTimerSecs(v); });
    sub(FK.TIMER_START,   v => setTimerStartAt(v || null));

    COLS.forEach(c => {
      const r = db.ref(c.sk);
      r.on("value", s => { if(s.exists()) setCandidates(prev => ({...prev, [c.id]: s.val()})); });
      refs.push(r);
    });

    // 初回データ確認後にready
    db.ref(FK.GAME).once("value", ()=>setDbReady(true));

    return () => refs.forEach(r => r.off());
  }, []);

  // ── Firebase書き込みヘルパー（State経由しない）──
  const fbSet  = (key, val) => db.ref(key).set(val);
  const fbUpd  = (updates) => db.ref("/").update(updates);

  const maleRanking   = useMemo(()=>buildRanking(votes, true),  [votes]);
  const femaleRanking = useMemo(()=>buildRanking(votes, false), [votes]);

  // タイマーカウントダウン（毎秒ローカル計算）
  useEffect(()=>{
    if(!timerEnabled || !timerStartAt){ setRemaining(null); return; }
    const total = (timerMins * 60 + timerSecs);
    const calc = () => {
      const elapsed = Math.floor((Date.now() - timerStartAt) / 1000);
      const rem = Math.max(0, total - elapsed);
      setRemaining(rem);
    };
    calc();
    const iv = setInterval(calc, 500);
    return () => clearInterval(iv);
  },[timerEnabled, timerStartAt, timerMins, timerSecs]);

  // ゲームクローズ時にニックネームを自動解除
  useEffect(()=>{
    if(!gameOpen){
      setLockedNickname(null);
      localStorage.removeItem("myNickname_s1");
      setNicknameInput("");
    }
  },[gameOpen]);

  // 結果公開時に1位を自動ペナルティ
  const prevResultsOpen = useRef(false);
  useEffect(()=>{
    if(resultsOpen && !prevResultsOpen.current){
      const fp = [...maleRanking,...femaleRanking].filter(r=>r.rank===1&&r.name!=="--").map(r=>r.name);
      if(fp.length) fbSet(FK.PENALIZED, [...new Set([...penalizedPlayers,...fp])]);
    }
    prevResultsOpen.current = resultsOpen;
  },[resultsOpen]);

  // ── アクション ────────────────────────────
  const handleAdminLogin = ()=>{
    if(passwordInput===ADMIN_PASSWORD){setAdminUnlocked(true);setPasswordInput("");}
    else alert("パスワードが違います");
  };

  const handleCloseGame = ()=>{
    // candidates は絶対に触らない
    db.ref(FK.GAME).set(false);
    db.ref(FK.PENALIZED).set(null);
    db.ref(FK.VOTED).set(null);
    db.ref(FK.TIMER_START).set(null); // タイマーリセット
    setLockedNickname(null);
    localStorage.removeItem("myNickname_s1");
  };

  const handleReset = ()=>{
    const t = newThemeInput.trim() || themeTitle;
    // candidates と lockedNickname は触らない
    // Firebaseは空配列をnullとみなすのでnullでセットする
    db.ref(FK.THEME).set(t);
    db.ref(FK.VOTES).set(null);
    db.ref(FK.VOTED).set(null);
    db.ref(FK.LOTTERY).set(null);
    db.ref(FK.RESULTS).set(false);
    db.ref(FK.TIMER_START).set(null); // タイマーリセット
    setNewThemeInput(""); setShowResetModal(false);
  };

  const submitVote = ()=>{
    const name = (lockedNickname||nicknameInput).trim();
    if(!name||!maleVote||!femaleVote){alert("名前と男女両方を選択してください");return;}
    const safeKey = name.replace(/[.#$\[\]/]/g,"_");
    if(votedNicknames[safeKey]){alert("このニックネームは既に使われています");return;}
    if(!lockedNickname) setLockedNickname(name);
    // votes は配列なのでpush相当（Firebase側でindex付きオブジェクトになる）
    const newVotes = [...votes, {nickname:name, maleVote, femaleVote}];
    const updates = {
      [FK.VOTES]: newVotes,
      [`${FK.VOTED}/${safeKey}`]: true,
    };
    // 最初の投票でタイマースタート
    if(timerEnabled && !timerStartAt && votes.length === 0){
      updates[FK.TIMER_START] = Date.now();
    }
    fbUpd(updates);
    alert("投票を受け付けました！");
    setMaleVote(""); setFemaleVote("");
  };

  const runLottery = ()=>{
    if(!votes.length){alert("投票データがありません");return;}
    if(isLotteryRolling) return;
    const participants = [...new Set(votes.map(v=>v.nickname))];
    // 演出開始：前の結果を隠してからくるくる表示
    setIsLotteryRolling(true);
    fbUpd({ [FK.LOTTERY]: null });  // 抽選中は前の結果を非表示
    let tick = 0;
    const interval = setInterval(()=>{
      const shuffled = [...participants].sort(()=>Math.random()-.5);
      setRollingNames(shuffled.slice(0, Math.min(3, shuffled.length)));
      tick++;
    }, 120);
    // 3秒後に結果確定
    setTimeout(()=>{
      clearInterval(interval);
      const winners = weightedLottery(participants, penalizedPlayers, winnerCount);
      fbUpd({
        [FK.LOTTERY]: winners.map(name=>({nickname:name})),
        [FK.PENALIZED]: [...new Set([...penalizedPlayers,...winners])],
      });
      setIsLotteryRolling(false);
      setRollingNames([]);
    }, 3000);
  };

  const addCandidate    = (colId,name)=>{ if(!name.trim())return; fbSet(colId==="c11m"?COLS[0].sk:colId==="c12m"?COLS[1].sk:colId==="c11f"?COLS[2].sk:COLS[3].sk, [...candidates[colId],name.trim()]); };
  const removeCandidate = (colId,i)  =>{ const sk=COLS.find(c=>c.id===colId).sk; fbSet(sk,candidates[colId].filter((_,j)=>j!==i)); };
  const moveCandidate   = (colId,i,dir)=>{
    const list=[...candidates[colId]]; const t=i+dir;
    if(t<0||t>=list.length)return;
    [list[i],list[t]]=[list[t],list[i]];
    fbSet(COLS.find(c=>c.id===colId).sk, list);
  };
  const processBulk = ()=>{
    const names=bulkModal.text.split(/[,\n]/).map(n=>n.trim()).filter(Boolean);
    if(!names.length)return;
    fbSet(COLS.find(c=>c.id===bulkModal.colId).sk, [...new Set([...candidates[bulkModal.colId],...names])]);
    setBulkModal({show:false,colId:"c11m",text:""});
  };

  const safeLockedKey  = (lockedNickname||"").replace(/[.#$\[\]/]/g,"_");
  const hasVotedThisRound = !!votedNicknames[safeLockedKey];

  if(!dbReady) return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-4 text-slate-400">
      <div className="anim-pulse-scale w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center">
        <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"/></svg>
      </div>
      <p className="font-black text-sm">Firebase に接続中...</p>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-50 p-2 md:p-8 font-sans text-slate-900">

      {/* Nav */}
      <nav className="max-w-3xl mx-auto flex justify-around mb-6 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 sticky top-2 z-50">
        {[
          {id:"vote",   Icon:I.Vote,     label:"投票", active:"bg-indigo-600"},
          {id:"screen", Icon:I.Monitor,  label:"結果", active:"bg-blue-600"},
          {id:"admin",  Icon:I.Settings, label:"管理", active:"bg-green-600"},
        ].map(item=>(
          <button key={item.id} onClick={()=>setMode(item.id)}
            className={`flex flex-col items-center flex-1 py-2 rounded-xl transition-all ${mode===item.id?`${item.active} text-white shadow-md`:"text-slate-400 hover:bg-slate-50"}`}>
            <item.Icon/><span className="text-[10px] font-bold mt-1 uppercase">{item.label}</span>
          </button>
        ))}
      </nav>

      <div className="max-w-3xl mx-auto">

        {/* ══ 投票ページ ══ */}
        {mode==="vote" && (
          <div className="anim-fade-in-up">
            {!gameOpen ? <MaintenanceScreen/> : (
              <div className="shadow-xl overflow-hidden rounded-3xl bg-white">
                <header className="bg-indigo-600 p-8 text-white text-center">
                  <h1 className="text-xs font-bold opacity-60 mb-2 uppercase tracking-widest">{electionLabel}</h1>
                  <h2 className="text-3xl font-black italic">{themeTitle}</h2>
                </header>
                <div className="p-4 md:p-8 space-y-6">
                  <TimerDisplay remaining={remaining} timerEnabled={timerEnabled} timerStartAt={timerStartAt}/>
                  {hasVotedThisRound ? (
                    <div className="text-center py-16 space-y-4">
                      <I.Check/>
                      <h3 className="text-2xl font-black text-slate-800">投票済みです</h3>
                      <p className="text-slate-500 font-bold">結果発表をお待ちください</p>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="space-y-2 text-center">
                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest">
                          {lockedNickname ? "🔒 ゲーム終了まで変更できません" : "ゲーム内で使用するニックネームを設定してください"}
                        </label>
                        {lockedNickname ? (
                          <div className="w-full p-4 bg-indigo-50 border-2 border-indigo-200 rounded-2xl font-black text-xl text-indigo-700 flex items-center justify-center gap-2">
                            <I.LockSm/>{lockedNickname}
                          </div>
                        ) : (
                          <>
                            <input value={nicknameInput} onChange={e=>setNicknameInput(e.target.value)}
                              className={`w-full p-4 bg-slate-50 border-2 rounded-2xl transition-all text-center font-bold text-lg outline-none ${nicknameInput.trim() && votedNicknames[nicknameInput.trim().replace(/[.#$\[\]/]/g,"_")] ? "border-red-400 bg-red-50" : "border-slate-100 focus:border-indigo-500"}`}
                              placeholder="あなたのニックネーム"/>
                            {nicknameInput.trim() && votedNicknames[nicknameInput.trim().replace(/[.#$\[\]/]/g,"_")] && (
                              <p className="text-red-500 font-black text-xs">このニックネームは既に使われています</p>
                            )}
                          </>
                        )}
                        {!lockedNickname && !votedNicknames[nicknameInput.trim().replace(/[.#$\[\]/]/g,"_")] && <p className="text-[10px] text-slate-400 font-bold">※ 投票するとゲーム終了まで名前が固定されます</p>}
                      </div>

                      <div className="space-y-2">
                        <div className="flex items-center gap-2"><span className="text-lg">👨</span><p className="text-indigo-700 font-black text-sm">男性部門</p></div>
                        <div className="grid grid-cols-2 gap-3">
                          {COLS.filter(c=>c.gender==="male").map(col=>(
                            <div key={col.id} className="space-y-1">
                              <div className={`text-center text-[11px] font-black py-1 px-2 rounded-lg ${col.colorCls.bg} text-white tracking-widest`}>{col.label}</div>
                              <div className="flex flex-col gap-1 max-h-52 overflow-y-auto sb">
                                {candidates[col.id].map(name=>(
                                  <button key={name} onClick={()=>setMaleVote(name)}
                                    className={`w-full p-2.5 rounded-xl text-xs font-bold transition-all border-2 text-left ${maleVote===name?`${col.colorCls.sel} text-white shadow-md`:`bg-white border-slate-100 text-slate-600 ${col.colorCls.hover}`}`}>
                                    {name}
                                  </button>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="space-y-2">
                        <div className="flex items-center gap-2"><span className="text-lg">👩</span><p className="text-pink-600 font-black text-sm">女性部門</p></div>
                        <div className="grid grid-cols-2 gap-3">
                          {COLS.filter(c=>c.gender==="female").map(col=>(
                            <div key={col.id} className="space-y-1">
                              <div className={`text-center text-[11px] font-black py-1 px-2 rounded-lg ${col.colorCls.bg} text-white tracking-widest`}>{col.label}</div>
                              <div className="flex flex-col gap-1 max-h-52 overflow-y-auto sb">
                                {candidates[col.id].map(name=>(
                                  <button key={name} onClick={()=>setFemaleVote(name)}
                                    className={`w-full p-2.5 rounded-xl text-xs font-bold transition-all border-2 text-left ${femaleVote===name?`${col.colorCls.sel} text-white shadow-md`:`bg-white border-slate-100 text-slate-600 ${col.colorCls.hover}`}`}>
                                    {name}
                                  </button>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      <button onClick={submitVote}
                        disabled={!(lockedNickname||nicknameInput.trim())||!maleVote||!femaleVote}
                        className="w-full h-16 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-20 text-white rounded-2xl text-xl font-black shadow-lg active:scale-95 transition-all">
                        投票を送信する
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ 結果ページ ══ */}
        {mode==="screen" && (
          <div className="anim-fade-in">
            {!gameOpen ? <MaintenanceScreen/> : (
              <div className="shadow-xl rounded-3xl overflow-hidden bg-white">
                <header className="bg-blue-600 p-8 text-white text-center">
                  <h2 className="text-3xl font-black italic">{themeTitle}</h2>
                  <p className="text-[10px] font-bold opacity-60 mt-2 uppercase tracking-[0.3em]">Official Results</p>
                </header>
                <div className="p-10 space-y-12">
                  <TimerDisplay remaining={remaining} timerEnabled={timerEnabled} timerStartAt={timerStartAt}/>
                  {!resultsOpen ? (
                    <div className="text-center py-10 space-y-8">
                      <div className="anim-spin-slow text-slate-200 flex justify-center">
                        <svg className="w-16 h-16" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
                        </svg>
                      </div>
                      <p className="text-slate-400 font-black text-xl">現在集計中です...</p>
                      <div className="relative inline-block">
                        <div className="absolute -inset-1 bg-gradient-to-r from-blue-400 to-indigo-400 rounded-[2.5rem] blur opacity-25"/>
                        <div className="relative bg-white rounded-[2rem] p-8 border border-slate-100 shadow-xl min-w-[280px]">
                          <p className="text-blue-600 font-black text-[10px] uppercase tracking-[0.25em] mb-4 flex items-center justify-center gap-2"><I.Trend/> Live Status</p>
                          <div className="flex items-center justify-center gap-4">
                            <div className="bg-blue-50 p-4 rounded-2xl text-blue-500"><I.Users2/></div>
                            <div className="text-left">
                              <div className="flex items-baseline gap-1">
                                <span key={Object.keys(votedNicknames).length} className="anim-count-up text-6xl font-black text-slate-800 tabular-nums leading-none">{Object.keys(votedNicknames).length}</span>
                                <span className="text-xl font-black text-slate-400">名</span>
                              </div>
                              <p className="text-slate-400 text-[10px] font-bold mt-1 uppercase tracking-wider">が投票を完了しました</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                      {[
                        {title:"👨 Male Ranking",  ranking:maleRanking,   accent:"text-indigo-700", color:"text-indigo-600"},
                        {title:"👩 Female Ranking",ranking:femaleRanking, accent:"text-pink-600",   color:"text-pink-500"},
                      ].map(sec=>(
                        <div key={sec.title} className="space-y-8 text-center">
                          <h3 className={`${sec.color} font-black text-xs uppercase border-b border-slate-50 pb-3 tracking-widest`}>{sec.title}</h3>
                          {sec.ranking.map((res,i)=>(
                            <div key={i} className="flex flex-col items-center">
                              <span className={`font-black ${res.name==="--"?"text-slate-100 text-4xl":res.rank===1?`${sec.accent} text-6xl`:"text-slate-700 text-4xl"}`}>
                                {res.rank===1&&res.name!=="--"&&"👑"} {res.name}
                              </span>
                              <span className="text-[10px] font-black text-slate-400">{res.rank}位 / {res.score}票</span>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  )}
                  {resultsOpen && (
                    <div className="pt-10 border-t border-slate-100 flex flex-col items-center gap-6">

                      {/* 抽選ボタン：管理者のみ操作可能 */}
                      {adminUnlocked ? (
                        <button onClick={runLottery} disabled={isLotteryRolling}
                          className="w-full max-w-sm bg-amber-500 hover:bg-amber-600 disabled:opacity-60 text-white font-black rounded-2xl h-16 text-xl shadow-lg active:scale-95 transition-all">
                          {isLotteryRolling ? "🎰 抽選中..." : "🎰 当選者の抽選"}
                        </button>
                      ) : (
                        <div className="w-full max-w-sm">
                          <div className="w-full bg-slate-100 border-2 border-slate-200 text-slate-400 font-black rounded-2xl h-16 text-base flex items-center justify-center gap-2 cursor-not-allowed select-none">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
                            管理者のみ抽選できます
                          </div>
                          <p className="text-center text-[10px] text-slate-400 font-bold mt-2">管理ページでログインすると抽選が可能になります</p>
                        </div>
                      )}

                      {/* 抽選中アニメーション */}
                      {isLotteryRolling && (
                        <div className="w-full max-w-sm">
                          <div className="bg-gradient-to-br from-amber-400 to-orange-500 rounded-[2.5rem] p-1 shadow-2xl">
                            <div className="bg-amber-50 rounded-[2.2rem] p-8 text-center space-y-5">
                              {/* ガラガラアイコン */}
                              <div className="flex justify-center">
                                <div className="relative w-20 h-20">
                                  <div className="anim-garapon-spin absolute inset-0 flex items-center justify-center">
                                    <svg className="w-16 h-16 text-amber-500" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                                      <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
                                    </svg>
                                  </div>
                                  <div className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full anim-drum-roll"/>
                                  <div className="absolute -bottom-1 -left-1 w-4 h-4 bg-amber-600 rounded-full anim-drum-roll" style={{animationDelay:"0.1s"}}/>
                                </div>
                              </div>
                              <p className="text-amber-700 font-black text-sm tracking-widest uppercase">🎲 抽選中 🎲</p>
                              {/* 名前は表示しない（結果発表まで秘密） */}
                              <div className="min-h-[80px] flex flex-col items-center justify-center gap-2">
                                <div className="flex gap-2">
                                  {[0,1,2].map(i=>(
                                    <div key={i} className="w-3 h-3 rounded-full bg-amber-400 anim-drum-roll" style={{animationDelay:`${i*0.15}s`}}/>
                                  ))}
                                </div>
                                <p className="text-amber-400 font-black text-xs tracking-widest">selecting...</p>
                              </div>
                              {/* プログレスバー */}
                              <div className="w-full h-2 bg-amber-200 rounded-full overflow-hidden">
                                <div className="anim-slide-bar h-full w-1/3 bg-gradient-to-r from-amber-500 to-orange-500 rounded-full"/>
                              </div>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* 当選結果 */}
                      {!isLotteryRolling && lotteryWinners.length>0 && (
                        <div className="anim-winner-pop w-full max-w-sm">
                          <div className="bg-gradient-to-br from-amber-400 to-orange-500 rounded-[2.5rem] p-1 shadow-2xl">
                            <div className="bg-amber-50 rounded-[2.2rem] p-8 text-center space-y-4">
                              <div className="text-4xl anim-bounce-in">🎉</div>
                              <p className="text-amber-600 font-black text-xs tracking-[0.3em] uppercase">✨ Lucky Winner ✨</p>
                              {lotteryWinners.map((w,i)=>(
                                <div key={i} className="anim-winner-pop" style={{animationDelay:`${i*0.15}s`}}>
                                  <span className="text-5xl font-black text-amber-900 block">{w.nickname}</span>
                                  <span className="text-base font-black text-amber-600">様</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}

                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ 管理ページ ══ */}
        {mode==="admin" && (
          <div className="anim-fade-in">
            {!adminUnlocked ? (
              <div className="p-10 text-center space-y-6 rounded-3xl shadow-xl bg-white">
                <div className="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto text-slate-300"><I.Lock/></div>
                <h2 className="text-xl font-black italic">管理者用ログインページ</h2>
                <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()}
                  className="w-full p-4 bg-slate-100 rounded-2xl text-center font-bold text-xl outline-none focus:ring-2 focus:ring-green-500" placeholder="••••"/>
                <button onClick={handleAdminLogin} className="w-full bg-slate-900 text-white rounded-2xl h-14 font-black">ログイン</button>
              </div>
            ) : (
              <div className="space-y-6 pb-20">

                <div className="bg-green-50 border border-green-200 rounded-2xl px-4 py-3 flex items-center gap-2 text-green-700 text-sm font-bold">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"/></svg>
                  Firebase リアルタイム接続中 — 全端末でデータが同期されます
                </div>

                {/* ゲームステータス */}
                <div className={`rounded-3xl shadow-xl overflow-hidden border-2 transition-all duration-500 ${gameOpen?"border-green-300":"border-slate-200"}`}>
                  <div className={`p-5 font-black text-white flex items-center justify-between transition-all duration-500 ${gameOpen?"bg-green-500":"bg-slate-500"}`}>
                    <div className="flex items-center gap-2"><I.Power/><span className="text-sm uppercase tracking-widest">ゲームステータス</span></div>
                    <span className="text-xs font-black px-3 py-1 rounded-full bg-white/25">{gameOpen?"● OPEN":"○ CLOSED"}</span>
                  </div>
                  <div className="p-6 space-y-4">
                    <p className="text-slate-500 text-sm font-bold">{gameOpen?"現在オープン中。投票・結果ページが全員に公開されています。":"現在クローズ中。管理ページ以外は「準備中」と表示されます。"}</p>
                    <div className="flex gap-3">
                      <button onClick={()=>fbSet(FK.GAME,true)}
                        className={`flex-1 h-14 rounded-2xl font-black text-sm transition-all border-2 ${gameOpen?"bg-green-500 border-green-500 text-white shadow-lg":"bg-white border-slate-200 text-slate-400 hover:border-green-300 hover:text-green-500"}`}>
                        ✓　オープン
                      </button>
                      <button onClick={handleCloseGame}
                        className={`flex-1 h-14 rounded-2xl font-black text-sm transition-all border-2 ${!gameOpen?"bg-slate-700 border-slate-700 text-white shadow-lg":"bg-white border-slate-200 text-slate-400 hover:border-slate-400 hover:text-slate-600"}`}>
                        ✕　クローズ
                      </button>
                    </div>
                    <p className="text-[10px] text-slate-400 font-bold">※ クローズするとニックネームロックが解除されます（候補者リストは維持）</p>
                  </div>
                </div>

                {/* お題編集 */}
                <div className="rounded-3xl shadow-xl bg-white border-2 border-indigo-400 overflow-hidden">
                  <div className="bg-indigo-400 p-4 font-black text-white flex items-center gap-2"><I.Edit/> お題（テーマ）の編集</div>
                  <div className="p-6 space-y-3">
                    <div>
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">投票ページのタイトル（Electionの部分）</label>
                      <div className="flex gap-2">
                        <input value={tempElectionLabel} onChange={e=>setTempElectionLabel(e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&fbSet(FK.ELECTION_LABEL,tempElectionLabel)}
                          className="flex-1 p-3 bg-slate-50 rounded-2xl font-black focus:ring-2 focus:ring-indigo-300 text-base outline-none"
                          placeholder="Election"/>
                        <button onClick={()=>fbSet(FK.ELECTION_LABEL,tempElectionLabel)} className="bg-indigo-400 text-white rounded-2xl px-5 flex items-center"><I.Save/></button>
                      </div>
                    </div>
                    <div>
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">お題</label>
                      <div className="flex gap-2">
                        <input value={tempTheme} onChange={e=>setTempTheme(e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&fbSet(FK.THEME,tempTheme)}
                          className="flex-1 p-4 bg-slate-50 rounded-2xl font-black focus:ring-2 focus:ring-indigo-500 text-lg outline-none"/>
                        <button onClick={()=>fbSet(FK.THEME,tempTheme)} className="bg-indigo-600 text-white rounded-2xl px-6 flex items-center"><I.Save/></button>
                      </div>
                    </div>
                  </div>
                </div>

                {/* タイマー設定 */}
                <div className="rounded-3xl shadow-xl bg-white overflow-hidden border-2 border-teal-400">
                  <div className="bg-teal-500 p-4 font-black text-white flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
                      <span className="text-sm uppercase tracking-widest">回答締め切りタイマー</span>
                    </div>
                    {/* ON/OFF トグル */}
                    <button onClick={()=>fbSet(FK.TIMER_ENABLED, !timerEnabled)}
                      className={`relative w-14 h-7 rounded-full transition-all duration-300 ${timerEnabled?"bg-white":"bg-teal-700"}`}>
                      <div className={`absolute top-1 w-5 h-5 rounded-full shadow transition-all duration-300 ${timerEnabled?"left-8 bg-teal-500":"left-1 bg-teal-300"}`}/>
                    </button>
                  </div>
                  <div className="p-6 space-y-4">
                    {!timerEnabled ? (
                      <p className="text-slate-400 font-bold text-sm text-center py-2">タイマーOFF — 時間無制限で投票できます</p>
                    ) : (
                      <>
                        <p className="text-slate-500 text-xs font-bold">最初の投票があった時点でカウントダウン開始。投票・結果ページにリアルタイムで残り時間が表示されます。</p>
                        {/* スロット形式の時間設定 */}
                        <div className="flex items-center justify-center gap-4">
                          {/* 分 */}
                          <div className="flex flex-col items-center gap-1">
                            <button onClick={()=>fbSet(FK.TIMER_MINS, Math.min(59, timerMins+1))}
                              className="w-10 h-10 rounded-xl bg-teal-50 hover:bg-teal-100 text-teal-600 font-black text-lg transition-all active:scale-95">▲</button>
                            <div className="w-20 h-16 bg-teal-500 rounded-2xl flex items-center justify-center shadow-inner">
                              <span className="text-4xl font-black text-white tabular-nums">{String(timerMins).padStart(2,"0")}</span>
                            </div>
                            <button onClick={()=>fbSet(FK.TIMER_MINS, Math.max(0, timerMins-1))}
                              className="w-10 h-10 rounded-xl bg-teal-50 hover:bg-teal-100 text-teal-600 font-black text-lg transition-all active:scale-95">▼</button>
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">分</span>
                          </div>
                          <span className="text-4xl font-black text-slate-300 pb-6">:</span>
                          {/* 秒 */}
                          <div className="flex flex-col items-center gap-1">
                            <button onClick={()=>fbSet(FK.TIMER_SECS, Math.min(59, timerSecs+10))}
                              className="w-10 h-10 rounded-xl bg-teal-50 hover:bg-teal-100 text-teal-600 font-black text-lg transition-all active:scale-95">▲</button>
                            <div className="w-20 h-16 bg-teal-500 rounded-2xl flex items-center justify-center shadow-inner">
                              <span className="text-4xl font-black text-white tabular-nums">{String(timerSecs).padStart(2,"0")}</span>
                            </div>
                            <button onClick={()=>fbSet(FK.TIMER_SECS, Math.max(0, timerSecs-10))}
                              className="w-10 h-10 rounded-xl bg-teal-50 hover:bg-teal-100 text-teal-600 font-black text-lg transition-all active:scale-95">▼</button>
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">秒 (10秒単位)</span>
                          </div>
                        </div>
                        {/* 現在のタイマー状態 */}
                        <div className={`rounded-xl p-3 text-center text-xs font-black ${timerStartAt?"bg-orange-50 text-orange-600":"bg-slate-50 text-slate-400"}`}>
                          {timerStartAt
                            ? remaining === 0
                              ? "⏰ 締め切り時間になりました"
                              : `⏱ カウントダウン中 — 残り ${Math.floor(remaining/60)}分${remaining%60}秒`
                            : "最初の投票があった時点でスタートします"}
                        </div>
                      </>
                    )}
                  </div>
                </div>

                {/* 候補者リスト */}
                <div className="rounded-3xl shadow-xl bg-white overflow-hidden">
                  <div className="bg-slate-700 p-4 font-black text-white flex items-center gap-2">
                    <I.Users/> 候補者リスト
                    <span className="ml-auto text-[10px] bg-slate-600 px-2 py-1 rounded-full">🔒 投票をまたいで保持</span>
                  </div>
                  <div className="flex border-b border-slate-100">
                    {COLS.map(col=>(
                      <button key={col.id} onClick={()=>setAdminColTab(col.id)}
                        className={`flex-1 py-3 text-xs font-black transition-all ${adminColTab===col.id?col.colorCls.tab:"text-slate-400 hover:bg-slate-50"}`}>
                        {col.label}
                      </button>
                    ))}
                  </div>
                  {COLS.map(col=>{
                    if(adminColTab!==col.id)return null;
                    return (
                      <div key={col.id} className="p-4 space-y-3">
                        <CandidateInput bgColor={col.colorCls.bg} onAdd={name=>addCandidate(col.id,name)}/>
                        <button className="w-full text-[10px] font-black py-2 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 hover:border-slate-300 flex items-center justify-center gap-1"
                          onClick={()=>setBulkModal({show:true,colId:col.id,text:""})}>
                          <I.ListPlus/> まとめて登録
                        </button>
                        <div className="max-h-64 overflow-y-auto sb space-y-1">
                          {candidates[col.id].map((name,i)=>(
                            <div key={i} className="flex items-center gap-1 p-2 bg-slate-50 rounded-lg">
                              <div className="flex flex-col mr-1">
                                <button onClick={()=>moveCandidate(col.id,i,-1)} disabled={i===0} className="text-slate-300 hover:text-slate-600 disabled:opacity-20 text-xs leading-tight">▲</button>
                                <button onClick={()=>moveCandidate(col.id,i,1)} disabled={i===candidates[col.id].length-1} className="text-slate-300 hover:text-slate-600 disabled:opacity-20 text-xs leading-tight">▼</button>
                              </div>
                              <span className="flex-1 text-sm font-bold">{name}</span>
                              <button onClick={()=>removeCandidate(col.id,i)} className="text-slate-300 hover:text-red-500 transition-colors"><I.X/></button>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 結果公開 / 当選人数 */}
                <div className="rounded-3xl shadow-xl bg-white p-6">
                  <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center block">結果公開</label>
                      <button onClick={()=>fbSet(FK.RESULTS,!resultsOpen)}
                        className={`w-full font-black rounded-2xl h-12 transition-all ${resultsOpen?"bg-blue-600 text-white":"bg-slate-100 text-slate-400"}`}>
                        {resultsOpen?"公開中":"非公開"}
                      </button>
                    </div>
                    <div className="space-y-1">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center block">当選人数</label>
                      <input type="number" min="1" value={winnerCount}
                        onChange={e=>fbSet(FK.COUNT,Math.max(1,parseInt(e.target.value)||1))}
                        className="w-full p-3 bg-slate-100 rounded-2xl text-center font-black outline-none focus:ring-2 focus:ring-amber-500"/>
                    </div>
                  </div>
                </div>

                {/* 新しい投票に進む */}
                <div className="rounded-3xl shadow-xl bg-white overflow-hidden border-2 border-red-100">
                  <div className="bg-red-50 p-4 font-black text-red-400 flex items-center gap-2 text-sm uppercase tracking-widest">
                    <I.Refresh/> 新しい投票
                  </div>
                  <div className="p-6 space-y-3">
                    <p className="text-slate-500 text-sm font-bold">投票データ・抽選結果をリセットして新しい投票を開始します。</p>
                    <div className="text-[11px] font-bold bg-slate-50 rounded-xl p-3 space-y-1 text-slate-500">
                      <p>✅ 候補者リストはそのまま保持されます</p>
                      <p>✅ ニックネームロックはそのまま維持されます</p>
                      <p>🗑️ 投票データ・抽選結果のみリセット</p>
                    </div>
                    <button onClick={()=>{setNewThemeInput(themeTitle);setShowResetModal(true);}}
                      className="w-full h-14 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                      <I.Refresh/> 新しい投票に進む
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* 一括登録モーダル */}
      {bulkModal.show && (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
          <div className="anim-bounce-in bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl space-y-4">
            <h3 className="text-lg font-black text-center">{COLS.find(c=>c.id===bulkModal.colId)?.label} を一括登録</h3>
            <p className="text-[10px] text-slate-400 font-bold text-center">名前を改行またはカンマ(,)で区切って入力してください</p>
            <textarea rows={10} value={bulkModal.text} onChange={e=>setBulkModal(prev=>({...prev,text:e.target.value}))}
              className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-indigo-500 resize-none"/>
            <div className="flex gap-2">
              <button onClick={()=>setBulkModal(prev=>({...prev,show:false}))} className="flex-1 p-3 font-bold text-slate-600 bg-slate-100 rounded-xl">キャンセル</button>
              <button onClick={processBulk} className="flex-1 p-3 bg-slate-900 text-white font-bold rounded-xl">登録実行</button>
            </div>
          </div>
        </div>
      )}

      {/* リセット確認モーダル */}
      {showResetModal && (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
          <div className="anim-bounce-in bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl space-y-6">
            <div className="text-center space-y-2">
              <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto text-red-500"><I.Refresh/></div>
              <h3 className="text-xl font-black text-slate-800">新しい投票の準備</h3>
              <p className="text-slate-400 text-sm font-bold">投票データ・抽選結果がリセットされます。</p>
              <p className="text-[11px] text-slate-400 bg-slate-50 rounded-xl p-2">候補者リスト・ニックネームロックは維持されます</p>
            </div>
            <div className="space-y-2">
              <label className="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-1"><I.Edit/> 新しいお題を入力</label>
              <input value={newThemeInput} onChange={e=>setNewThemeInput(e.target.value)}
                className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-base outline-none focus:border-indigo-400 transition-all"
                placeholder="例：クラスで一番〇〇なのは？"/>
              <p className="text-[10px] text-slate-300 font-bold">※ 空欄のままだと現在のお題が引き継がれます</p>
            </div>
            <div className="flex gap-3">
              <button onClick={()=>{setShowResetModal(false);setNewThemeInput("");}} className="flex-1 h-12 font-black rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-600">キャンセル</button>
              <button onClick={handleReset} className="flex-1 h-12 bg-red-500 hover:bg-red-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all">スタート！</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
